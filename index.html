<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ignitoz comparte contenido sobre IA, herramientas, código, modelos e innovación aplicada."
    />
    <title>Ignitoz | IA, herramientas, código e innovación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/tokens.css" />
    <link rel="stylesheet" href="./src/styles/base.css" />
    <link rel="stylesheet" href="./src/styles/home.css" />
  </head>
  <body class="landing-page">
    <div class="landing-shell">
      <header class="landing-header">
        <nav class="landing-nav" aria-label="Principal">
          <a class="landing-brand" href="/" aria-label="Ignitoz, ir al inicio">
            <span class="landing-brand-text">IGNITOZ</span>
          </a>

          <a
            class="landing-subscribe-button"
            href="https://www.youtube.com/@Ignitoz?sub_confirmation=1"
            target="_blank"
            rel="noreferrer"
          >
            Suscríbete
          </a>
        </nav>
      </header>

      <main class="landing-main">
        <section class="landing-hero" aria-labelledby="landing-title">
          <div class="landing-hero-inner">
            <h1 class="landing-hero-title" id="landing-title">
              IA, herramientas, código, modelos e
              <span class="landing-accent">innovación</span>
            </h1>

            <p class="landing-hero-description">
              En el canal comparto mi experiencia e información sobre herramientas,
              programación, modelos de IA y experimentación aplicada.
            </p>

            <div class="landing-actions">
              <a
                class="landing-channel-button"
                href="https://www.youtube.com/@Ignitoz"
                target="_blank"
                rel="noreferrer"
              >
                <span>Ver canal</span>
                <span class="landing-channel-icon" aria-hidden="true">→</span>
              </a>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
